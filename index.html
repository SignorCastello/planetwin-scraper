<!DOCTYPE html>
<html>
<head>
    <title>Scraper</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        #output { margin-top: 20px; text-align: left; display: inline-block; }
        
        /* Overlay minimalista */
        #loader {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(255,255,255,0.8);
            justify-content: center; align-items: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader">CARICAMENTO...</div>

    <button onclick="fetchData()">GENERA</button>
    <br>
    <div id="output"></div>

    <script>
        async function fetchData() {
            const loader = document.getElementById('loader');
            const output = document.getElementById('output');
            
            loader.style.display = 'flex'; // Mostra loader
            output.innerHTML = "";

            try {
                const res = await fetch('/start-scrape');
                const data = await res.json();

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.style.padding = "5px";
                    div.innerHTML = `<b>${item.match}</b>: U2.5 (${item.under_25}) | O1.5 (${item.over_15})`;
                    output.appendChild(div);
                });
            } catch (e) {
                output.innerText = "Errore connessione.";
            } finally {
                loader.style.display = 'none'; // Nasconde loader
            }
        }
    </script>
</body>
</html>
